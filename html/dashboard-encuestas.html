<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encuestas - Panel Administrador</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'sans': ['Poppins', 'sans-serif'],
          },
          colors: {
            'primary': {
              '500': '#0ea5e9',
              '600': '#0284c7',
            },
            'secondary': {
              '500': '#10b981',
              '600': '#059669',
            },
            'accent': {
              '500': '#f97316',
              '600': '#ea580c',
            },
            'light-bg': '#f8fafc',
          }
        }
      }
    }
  </script>
  <link href="../css/styles.css" rel="stylesheet">
  <link href="../css/dashboard.css" rel="stylesheet">
</head>

<body class="bg-light-bg text-gray-700 font-sans antialiased dashboard-container flex">

  <!-- Sidebar -->
  <aside class="dashboard-sidebar w-64 bg-white border-r border-gray-200 hidden md:flex flex-col h-screen sticky top-0">
    <div class="p-6 border-b border-gray-200">
      <h2 class="text-2xl font-bold text-primary-500">Panel Admin</h2>
    </div>
    <nav class="flex-1 p-4 space-y-2">
      <a href="dashboard.html"
        class="flex items-center gap-3 px-4 py-3 bg-primary-50 text-primary-600 rounded-lg font-semibold">
        <i class="fas fa-chart-pie"></i> Resumen
      </a>
      <a href="dashboard-usuarios.html"
        class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-primary-500 rounded-lg transition-colors">
        <i class="fas fa-users"></i> Usuarios
      </a>
      <a href="dashboard-calendario.html"
        class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-primary-500 rounded-lg transition-colors">
        <i class="fas fa-calendar-alt"></i> Calendario
      </a>
      <a href="dashboard-programas.html"
        class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-primary-500 rounded-lg transition-colors">
        <i class="fas fa-bullhorn"></i> Programas
      </a>
      <a href="dashboard-servicios.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-primary-500 rounded-lg transition-colors">
        <i class="fas fa-chalkboard-teacher"></i> Servicios
      </a>
      <a href="dashboard-accion-joven.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-primary-500 rounded-lg transition-colors">
        <i class="fas fa-hands-helping"></i> Acción Joven
      </a>
      <a href="dashboard-mensajes.html"
        class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-primary-500 rounded-lg transition-colors">
        <i class="fas fa-envelope"></i> Mensajes
      </a>
      <a href="dashboard-noticias.html"
        class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-primary-500 rounded-lg transition-colors">
        <i class="fas fa-newspaper"></i> Noticias
      </a>
      <a href="dashboard-config.html"
        class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-primary-500 rounded-lg transition-colors">
        <i class="fas fa-cog"></i> Configuración
      </a>
    </nav>
    <div class="p-4 border-t border-gray-200">
      <a href="index.html"
        class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-red-50 hover:text-red-500 rounded-lg transition-colors">
        <i class="fas fa-sign-out-alt"></i> Volver a la Web
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col min-h-screen">

    <!-- Top Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
      <div class="px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
          <button class="md:hidden text-gray-500 hover:text-primary-500 text-xl">
            <i class="fas fa-bars"></i>
          </button>
          <a href="dashboard.html" class="text-gray-500 hover:text-primary-500 mr-2"><i class="fas fa-arrow-left"></i> Volver</a>
          <h1 class="text-xl font-semibold text-gray-800">Resultados de Encuestas</h1>
        </div>
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-3">
            <div class="text-right hidden sm:block">
              <p class="text-sm font-semibold text-gray-800">Admin</p>
              <p class="text-xs text-gray-500">Oficina de Juventud</p>
            </div>
            
          </div>
        </div>
      </div>
    </header>

    <div class="p-6 md:p-8 flex-1">
      
      <!-- Filters Row -->
      <div class="bg-white rounded-xl p-6 border border-gray-100 shadow-sm mb-6 flex flex-col md:flex-row gap-4 items-end">
        <div class="w-full md:w-1/4">
          <label class="block text-sm font-semibold text-gray-700 mb-1">Rango de Edad</label>
          <select id="filter-edad" class="w-full bg-gray-50 border border-gray-200 text-gray-700 rounded-lg p-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
            <option value="">Todas las edades</option>
            <option value="14-17">14 a 17 años</option>
            <option value="18-24">18 a 24 años</option>
            <option value="25-29">25 a 29 años</option>
          </select>
        </div>
        <div class="w-full md:w-1/4">
          <label class="block text-sm font-semibold text-gray-700 mb-1">Ocupación</label>
          <select id="filter-ocupacion" class="w-full bg-gray-50 border border-gray-200 text-gray-700 rounded-lg p-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
            <option value="">Todas las ocupaciones</option>
            <option value="estudiante">Estudiante</option>
            <option value="trabajador">Trabajador/a</option>
            <option value="buscando">Buscando empleo</option>
            <option value="ambos">Estudio y Trabajo</option>
            <option value="otro">Otro</option>
          </select>
        </div>
        <div class="w-full md:w-1/4">
          <label class="block text-sm font-semibold text-gray-700 mb-1">Calificación</label>
          <select id="filter-estrellas" class="w-full bg-gray-50 border border-gray-200 text-gray-700 rounded-lg p-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
            <option value="0">Todas las calificaciones</option>
            <option value="5">5 estrellas</option>
            <option value="4">4 estrellas</option>
            <option value="3">3 estrellas</option>
            <option value="2">2 estrellas</option>
            <option value="1">1 estrella</option>
          </select>
        </div>
        <div class="w-full md:w-auto flex gap-2">
            <button id="btn-limpiar-filtros" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2 px-4 rounded-lg transition-colors whitespace-nowrap" title="Limpiar Filtros">Limpiar <i class="fas fa-times ml-1"></i></button>
        </div>
      </div>

      <!-- Loading State -->
      <div id="encuestas-loading" class="text-center py-12">
        <i class="fas fa-circle-notch fa-spin text-4xl text-primary-500 mb-4"></i>
        <p class="text-gray-500 font-medium">Cargando encuestas...</p>
      </div>

      <!-- No Results State -->
      <div id="encuestas-empty" class="text-center py-12 hidden bg-white rounded-xl border border-gray-100 shadow-sm">
        <i class="fas fa-inbox text-4xl text-gray-300 mb-4"></i>
        <p class="text-gray-500 font-medium text-lg">No se encontraron encuestas</p>
        <p class="text-gray-400 text-sm mt-1">Prueba cambiando los filtros</p>
      </div>

      <!-- Results Grid -->
      <div id="encuestas-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-6 hidden">
        <!-- Las encuestas se inyectarán aquí -->
      </div>

    </div>
  </main>

  <script type="module" src="../js/dashboard-encuestas.js?v=4"></script>
</body>
</html>
